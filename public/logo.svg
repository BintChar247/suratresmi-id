<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 120" width="420" height="120">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E3A5F"/>
      <stop offset="100%" style="stop-color:#2E6DAD"/>
    </linearGradient>
  </defs>

  <!-- Letter/envelope icon -->
  <g transform="translate(15, 15)">
    <!-- Paper sheet -->
    <rect x="8" y="0" width="62" height="80" rx="4" fill="white" stroke="#1E3A5F" stroke-width="2.5"/>
    <!-- Fold corner -->
    <path d="M50 0 L70 0 L70 20 Z" fill="#E8EFF7" stroke="#1E3A5F" stroke-width="2.5" stroke-linejoin="round"/>
    <path d="M50 0 L50 20 L70 20" fill="none" stroke="#1E3A5F" stroke-width="2.5" stroke-linejoin="round"/>
    <!-- Text lines on paper -->
    <line x1="18" y1="28" x2="42" y2="28" stroke="#2E6DAD" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="18" y1="38" x2="52" y2="38" stroke="#B0C4DE" stroke-width="2" stroke-linecap="round"/>
    <line x1="18" y1="48" x2="48" y2="48" stroke="#B0C4DE" stroke-width="2" stroke-linecap="round"/>
    <line x1="18" y1="58" x2="44" y2="58" stroke="#B0C4DE" stroke-width="2" stroke-linecap="round"/>
    <!-- Checkmark / seal -->
    <circle cx="52" cy="64" r="10" fill="#2E6DAD" opacity="0.15"/>
    <path d="M47 64 L50.5 67.5 L57 60" fill="none" stroke="#2E6DAD" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Wordmark -->
  <text x="105" y="52" font-family="'Segoe UI', Arial, sans-serif" font-size="30" font-weight="700" fill="#1E3A5F" letter-spacing="-0.5">Surat</text>
  <text x="105" y="52" font-family="'Segoe UI', Arial, sans-serif" font-size="30" font-weight="700" fill="url(#g1)" letter-spacing="-0.5" dx="75">Resmi</text>
  <text x="260" y="52" font-family="'Segoe UI', Arial, sans-serif" font-size="30" font-weight="300" fill="#7A9CC6" letter-spacing="-0.5">.Online</text>

  <!-- Tagline -->
  <text x="106" y="74" font-family="'Segoe UI', Arial, sans-serif" font-size="11.5" fill="#7A9CC6" letter-spacing="3.5">SURAT RESMI INSTAN</text>
</svg>
